name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Format, lint, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hoopadmin_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @hoop/api prisma:generate

      - name: Run migrations (test DB)
        run: pnpm --filter @hoop/api prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hoopadmin_test

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hoopadmin_test
          JWT_SECRET: ci-test-secret
          API_URL: http://localhost:3001/api
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Build
        run: pnpm build
        env:
          API_URL: https://api.example.invalid/api
          NEXT_PUBLIC_API_URL: https://api.example.invalid/api
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: https://app.example.invalid
