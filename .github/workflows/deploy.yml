name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (example: main, sha-abcdef123456)'
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Check for skip conditions
        id: skip_check
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" =~ \[skip\ deploy\] ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: found [skip deploy]"
            exit 0
          fi

          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  validate-runtime-config:
    name: Validate deploy inputs
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    steps:
      - name: Validate runtime configuration
        env:
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "$DB_NAME" || -z "$DB_USER" || -z "$DB_PASSWORD" ]]; then
            echo "DB_NAME, DB_USER, and DB_PASSWORD are required"
            exit 1
          fi

          if [[ "$DB_NAME" == "postgres" || "$DB_NAME" == "pomodoro" ]]; then
            echo "Refusing shared database name: $DB_NAME"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$IMAGE_TAG" ]]; then
              echo "IMAGE_TAG is required"
              exit 1
            fi

            if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Invalid image tag: $IMAGE_TAG"
              exit 1
            fi
          fi

  build-api:
    name: Build API image
    needs: [check-skip, validate-runtime-config]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@main
    with:
      image: ghcr.io/${{ github.repository_owner }}/hoop-api
      context: .
      dockerfile: apps/api/Dockerfile
      stable_tag: main
    secrets: inherit

  build-web:
    name: Build web image
    needs: [check-skip, validate-runtime-config]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@main
    with:
      image: ghcr.io/${{ github.repository_owner }}/hoop-web
      context: .
      dockerfile: apps/web/Dockerfile
      stable_tag: main
    secrets: inherit

  prepare-deploy-targets:
    name: Prepare deploy targets
    runs-on: ubuntu-latest
    needs: [check-skip, validate-runtime-config]
    if: needs.check-skip.outputs.should_skip != 'true'
    outputs:
      vps_user: ${{ steps.values.outputs.vps_user }}
      vps_host: ${{ steps.values.outputs.vps_host }}
      deploy_dir: ${{ steps.values.outputs.deploy_dir }}
      db_name: ${{ steps.values.outputs.db_name }}
    steps:
      - name: Collect target values
        id: values
        env:
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
          DB_NAME: ${{ vars.DB_NAME }}
        run: |
          {
            echo "vps_user=$VPS_USER"
            echo "vps_host=$VPS_HOST"
            echo "deploy_dir=$VPS_APP_DIR"
            echo "db_name=$DB_NAME"
          } >> "$GITHUB_OUTPUT"

  prepare-auto-deploy:
    name: Prepare auto deploy env
    runs-on: ubuntu-latest
    needs: [check-skip, prepare-deploy-targets, build-api, build-web]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    outputs:
      runtime_env: ${{ steps.values.outputs.runtime_env }}
    steps:
      - name: Build runtime env
        id: values
        env:
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/hoop-api:${{ needs.build-api.outputs.image_tag }}
          WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/hoop-web:${{ needs.build-web.outputs.image_tag }}
          DB_HOST: ${{ vars.DB_HOST || 'postgres' }}
          DB_PORT: ${{ vars.DB_PORT || '5432' }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
        run: |
          APP_URL="${NEXTAUTH_URL%/}"

          {
            echo "runtime_env<<EOF"
            printf '%s\n' \
              "API_IMAGE=$API_IMAGE" \
              "WEB_IMAGE=$WEB_IMAGE" \
              "DB_HOST=$DB_HOST" \
              "DB_PORT=$DB_PORT" \
              "DB_NAME=$DB_NAME" \
              "DB_USER=$DB_USER" \
              "CORS_ORIGIN=$CORS_ORIGIN" \
              "OLLAMA_BASE_URL=$OLLAMA_BASE_URL" \
              "OLLAMA_MODEL=$OLLAMA_MODEL" \
              "API_URL=http://hoop-api:3001/api" \
              "NEXT_PUBLIC_API_URL=$APP_URL/api" \
              "NEXTAUTH_URL=$APP_URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  prepare-manual-deploy:
    name: Prepare manual deploy env
    runs-on: ubuntu-latest
    needs: prepare-deploy-targets
    if: github.event_name == 'workflow_dispatch'
    outputs:
      runtime_env: ${{ steps.values.outputs.runtime_env }}
    steps:
      - name: Build runtime env
        id: values
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/hoop-api:${{ inputs.image_tag }}
          WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/hoop-web:${{ inputs.image_tag }}
          DB_HOST: ${{ vars.DB_HOST || 'postgres' }}
          DB_PORT: ${{ vars.DB_PORT || '5432' }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
        run: |
          APP_URL="${NEXTAUTH_URL%/}"

          {
            echo "runtime_env<<EOF"
            printf '%s\n' \
              "API_IMAGE=$API_IMAGE" \
              "WEB_IMAGE=$WEB_IMAGE" \
              "DB_HOST=$DB_HOST" \
              "DB_PORT=$DB_PORT" \
              "DB_NAME=$DB_NAME" \
              "DB_USER=$DB_USER" \
              "CORS_ORIGIN=$CORS_ORIGIN" \
              "OLLAMA_BASE_URL=$OLLAMA_BASE_URL" \
              "OLLAMA_MODEL=$OLLAMA_MODEL" \
              "API_URL=http://hoop-api:3001/api" \
              "NEXT_PUBLIC_API_URL=$APP_URL/api" \
              "NEXTAUTH_URL=$APP_URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy-auto:
    name: Deploy to VPS (auto)
    needs: [check-skip, validate-runtime-config, prepare-deploy-targets, build-api, build-web, prepare-auto-deploy]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@main
    with:
      vps_user: ${{ needs.prepare-deploy-targets.outputs.vps_user }}
      vps_host: ${{ needs.prepare-deploy-targets.outputs.vps_host }}
      deploy_dir: ${{ needs.prepare-deploy-targets.outputs.deploy_dir }}
      compose_file: deploy/compose.vps.yml
      services: api web
      runtime_env: ${{ needs.prepare-auto-deploy.outputs.runtime_env }}
      bootstrap_databases: ${{ needs.prepare-deploy-targets.outputs.db_name }}
      health_retries: 20
      health_interval: 5
      log_tail: 100
    secrets:
      runtime_env_secret: |
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST || 'postgres' }}:${{ vars.DB_PORT || '5432' }}/${{ vars.DB_NAME }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}

  deploy-manual:
    name: Deploy to VPS (manual)
    needs: [check-skip, validate-runtime-config, prepare-deploy-targets, prepare-manual-deploy]
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@main
    with:
      vps_user: ${{ needs.prepare-deploy-targets.outputs.vps_user }}
      vps_host: ${{ needs.prepare-deploy-targets.outputs.vps_host }}
      deploy_dir: ${{ needs.prepare-deploy-targets.outputs.deploy_dir }}
      compose_file: deploy/compose.vps.yml
      services: api web
      runtime_env: ${{ needs.prepare-manual-deploy.outputs.runtime_env }}
      bootstrap_databases: ${{ needs.prepare-deploy-targets.outputs.db_name }}
      health_retries: 20
      health_interval: 5
      log_tail: 100
    secrets:
      runtime_env_secret: |
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST || 'postgres' }}:${{ vars.DB_PORT || '5432' }}/${{ vars.DB_NAME }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}
