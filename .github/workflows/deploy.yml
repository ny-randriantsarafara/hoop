name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (example: main, sha-abcdef123456)'
        required: false
        default: main

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hoop-api
  WEB_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hoop-web

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Check for skip conditions
        id: skip_check
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" =~ \[skip\ deploy\] ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: found [skip deploy]"
            exit 0
          fi

          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: check-skip
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.API_IMAGE_NAME }}:main

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.WEB_IMAGE_NAME }}:main

  deploy-auto:
    name: Deploy to VPS (auto)
    runs-on: ubuntu-latest
    needs: [check-skip, build-images]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Sync VPS compose file
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          scp -o StrictHostKeyChecking=yes deploy/compose.vps.yml "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/docker-compose.yml"

      - name: Write runtime .env on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          API_IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
        run: |
          tmp_env=$(mktemp)

          cat > "$tmp_env" <<EOF
          API_IMAGE=${API_IMAGE_NAME}:${IMAGE_TAG}
          WEB_IMAGE=${WEB_IMAGE_NAME}:${IMAGE_TAG}
          DATABASE_URL=$DATABASE_URL
          JWT_SECRET=$JWT_SECRET
          CORS_ORIGIN=$CORS_ORIGIN
          OLLAMA_BASE_URL=$OLLAMA_BASE_URL
          OLLAMA_MODEL=$OLLAMA_MODEL
          API_URL=$API_URL
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=$NEXTAUTH_URL
          EOF

          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "cat > '$VPS_APP_DIR/.env.tmp' && mv '$VPS_APP_DIR/.env.tmp' '$VPS_APP_DIR/.env'" \
            < "$tmp_env"

          rm -f "$tmp_env"

      - name: Deploy selected images
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          if [[ ! -f .env ]]; then
            echo "Missing $VPS_APP_DIR/.env"
            exit 1
          fi

          set -a
          . ./.env
          set +a

          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "DATABASE_URL is required in $VPS_APP_DIR/.env"
            exit 1
          fi

          if command -v python3 >/dev/null 2>&1; then
            readarray -t db_parts < <(python3 -c "import os, sys, urllib.parse as u; p = u.urlparse(os.environ.get('DATABASE_URL', '')); db = p.path.lstrip('/'); ok = p.scheme in ('postgres', 'postgresql') and p.username and p.password is not None and db; sys.exit(0 if ok else 1); print(p.username); print(p.password); print(db)") || {
              echo "Failed to parse DATABASE_URL"
              exit 1
            }
            db_user="${db_parts[0]}"
            db_password="${db_parts[1]}"
            db_name="${db_parts[2]}"
          else
            db_url="${DATABASE_URL#postgresql://}"
            db_url="${db_url#postgres://}"
            db_auth_host="${db_url%%/*}"
            db_path="${db_url#*/}"
            db_name="${db_path%%\?*}"
            db_auth="${db_auth_host%@*}"
            db_user="${db_auth%%:*}"
            db_password="${db_auth#*:}"

            if [[ -z "$db_user" || -z "$db_password" || -z "$db_name" || "$db_user" == "$db_auth" ]]; then
              echo "Failed to parse DATABASE_URL without python3"
              exit 1
            fi
          fi

          if [[ "$db_name" == "postgres" || "$db_name" == "pomodoro" ]]; then
            echo "Refusing shared database name: $db_name"
            exit 1
          fi

          db_user_sql=${db_user//\'/\'\'}
          db_password_sql=${db_password//\'/\'\'}
          db_name_sql=${db_name//\'/\'\'}
          db_user_ident=${db_user//\"/\"\"}
          db_name_ident=${db_name//\"/\"\"}

          if ! docker exec supabase-db psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname = '$db_user_sql'" | grep -q 1; then
            docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "CREATE ROLE \"$db_user_ident\" LOGIN PASSWORD '$db_password_sql'"
          fi

          if ! docker exec supabase-db psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$db_name_sql'" | grep -q 1; then
            docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$db_name_ident\" OWNER \"$db_user_ident\""
          fi

          docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "GRANT ALL PRIVILEGES ON DATABASE \"$db_name_ident\" TO \"$db_user_ident\""

          docker compose pull api web
          docker compose up -d api web

          for i in $(seq 1 20); do
            api_cid=$(docker compose ps -q api)
            web_cid=$(docker compose ps -q web)

            api_state=$(docker inspect --format '{{.State.Status}}' "$api_cid")
            web_state=$(docker inspect --format '{{.State.Status}}' "$web_cid")
            api_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$api_cid")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$web_cid")

            if [[ "$api_state" == "running" && "$web_state" == "running" ]] &&
               [[ ("$api_health" == "healthy" || "$api_health" == "none") && ("$web_health" == "healthy" || "$web_health" == "none") ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Services failed health check"
          docker compose logs --tail=100 api web
          exit 1
          EOF_REMOTE

  deploy-manual:
    name: Deploy to VPS (manual)
    runs-on: ubuntu-latest
    needs: check-skip
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Validate manual image tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -z "$IMAGE_TAG" ]]; then
            echo "IMAGE_TAG is required"
            exit 1
          fi

          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid image tag: $IMAGE_TAG"
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Sync VPS compose file
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          scp -o StrictHostKeyChecking=yes deploy/compose.vps.yml "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/docker-compose.yml"

      - name: Write runtime .env on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          API_IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
        run: |
          tmp_env=$(mktemp)

          cat > "$tmp_env" <<EOF
          API_IMAGE=${API_IMAGE_NAME}:${IMAGE_TAG}
          WEB_IMAGE=${WEB_IMAGE_NAME}:${IMAGE_TAG}
          DATABASE_URL=$DATABASE_URL
          JWT_SECRET=$JWT_SECRET
          CORS_ORIGIN=$CORS_ORIGIN
          OLLAMA_BASE_URL=$OLLAMA_BASE_URL
          OLLAMA_MODEL=$OLLAMA_MODEL
          API_URL=$API_URL
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=$NEXTAUTH_URL
          EOF

          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "cat > '$VPS_APP_DIR/.env.tmp' && mv '$VPS_APP_DIR/.env.tmp' '$VPS_APP_DIR/.env'" \
            < "$tmp_env"

          rm -f "$tmp_env"

      - name: Deploy selected images
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          if [[ ! -f .env ]]; then
            echo "Missing $VPS_APP_DIR/.env"
            exit 1
          fi

          set -a
          . ./.env
          set +a

          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "DATABASE_URL is required in $VPS_APP_DIR/.env"
            exit 1
          fi

          if command -v python3 >/dev/null 2>&1; then
            readarray -t db_parts < <(python3 -c "import os, sys, urllib.parse as u; p = u.urlparse(os.environ.get('DATABASE_URL', '')); db = p.path.lstrip('/'); ok = p.scheme in ('postgres', 'postgresql') and p.username and p.password is not None and db; sys.exit(0 if ok else 1); print(p.username); print(p.password); print(db)") || {
              echo "Failed to parse DATABASE_URL"
              exit 1
            }
            db_user="${db_parts[0]}"
            db_password="${db_parts[1]}"
            db_name="${db_parts[2]}"
          else
            db_url="${DATABASE_URL#postgresql://}"
            db_url="${db_url#postgres://}"
            db_auth_host="${db_url%%/*}"
            db_path="${db_url#*/}"
            db_name="${db_path%%\?*}"
            db_auth="${db_auth_host%@*}"
            db_user="${db_auth%%:*}"
            db_password="${db_auth#*:}"

            if [[ -z "$db_user" || -z "$db_password" || -z "$db_name" || "$db_user" == "$db_auth" ]]; then
              echo "Failed to parse DATABASE_URL without python3"
              exit 1
            fi
          fi

          if [[ "$db_name" == "postgres" || "$db_name" == "pomodoro" ]]; then
            echo "Refusing shared database name: $db_name"
            exit 1
          fi

          db_user_sql=${db_user//\'/\'\'}
          db_password_sql=${db_password//\'/\'\'}
          db_name_sql=${db_name//\'/\'\'}
          db_user_ident=${db_user//\"/\"\"}
          db_name_ident=${db_name//\"/\"\"}

          if ! docker exec supabase-db psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname = '$db_user_sql'" | grep -q 1; then
            docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "CREATE ROLE \"$db_user_ident\" LOGIN PASSWORD '$db_password_sql'"
          fi

          if ! docker exec supabase-db psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$db_name_sql'" | grep -q 1; then
            docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$db_name_ident\" OWNER \"$db_user_ident\""
          fi

          docker exec supabase-db psql -U postgres -v ON_ERROR_STOP=1 -c "GRANT ALL PRIVILEGES ON DATABASE \"$db_name_ident\" TO \"$db_user_ident\""

          docker compose pull api web
          docker compose up -d api web

          for i in $(seq 1 20); do
            api_cid=$(docker compose ps -q api)
            web_cid=$(docker compose ps -q web)

            api_state=$(docker inspect --format '{{.State.Status}}' "$api_cid")
            web_state=$(docker inspect --format '{{.State.Status}}' "$web_cid")
            api_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$api_cid")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$web_cid")

