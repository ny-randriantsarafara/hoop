name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (example: main, sha-abcdef123456)'
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Check for skip conditions
        id: skip_check
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" =~ \[skip\ deploy\] ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: found [skip deploy]"
            exit 0
          fi

          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  validate-runtime-config:
    name: Validate deploy inputs
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    steps:
      - name: Validate runtime configuration
        env:
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "$DB_NAME" || -z "$DB_USER" || -z "$DB_PASSWORD" ]]; then
            echo "DB_NAME, DB_USER, and DB_PASSWORD are required"
            exit 1
          fi

          if [[ "$DB_NAME" == "postgres" || "$DB_NAME" == "pomodoro" ]]; then
            echo "Refusing shared database name: $DB_NAME"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$IMAGE_TAG" ]]; then
              echo "IMAGE_TAG is required"
              exit 1
            fi

            if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Invalid image tag: $IMAGE_TAG"
              exit 1
            fi
          fi

  build-api:
    name: Build API image
    needs: [check-skip, validate-runtime-config]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@codex/reusable-build-deploy-split
    with:
      image: ghcr.io/${{ github.repository_owner }}/hoop-api
      context: .
      dockerfile: apps/api/Dockerfile
      stable_tag: main
    secrets: inherit

  build-web:
    name: Build web image
    needs: [check-skip, validate-runtime-config]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@codex/reusable-build-deploy-split
    with:
      image: ghcr.io/${{ github.repository_owner }}/hoop-web
      context: .
      dockerfile: apps/web/Dockerfile
      stable_tag: main
    secrets: inherit

  deploy-auto:
    name: Deploy to VPS (auto)
    needs: [check-skip, validate-runtime-config, build-api, build-web]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@codex/reusable-build-deploy-split
    with:
      vps_user: ${{ vars.VPS_USER }}
      vps_host: ${{ vars.VPS_HOST }}
      deploy_dir: ${{ vars.VPS_APP_DIR }}
      compose_file: deploy/compose.vps.yml
      services: api web
      bootstrap_databases: ${{ vars.DB_NAME }}
      health_retries: 20
      health_interval: 5
      log_tail: 100
    secrets:
      runtime_env: |
        API_IMAGE=ghcr.io/${{ github.repository_owner }}/hoop-api:${{ needs.build-api.outputs.image_tag }}
        WEB_IMAGE=ghcr.io/${{ github.repository_owner }}/hoop-web:${{ needs.build-web.outputs.image_tag }}
        DB_HOST=${{ vars.DB_HOST || 'postgres' }}
        DB_PORT=${{ vars.DB_PORT || '5432' }}
        DB_NAME=${{ vars.DB_NAME }}
        DB_USER=${{ vars.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST || 'postgres' }}:${{ vars.DB_PORT || '5432' }}/${{ vars.DB_NAME }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
        OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
        OLLAMA_MODEL=${{ vars.OLLAMA_MODEL }}
        API_URL=${{ vars.API_URL }}
        NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
        NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}

  deploy-manual:
    name: Deploy to VPS (manual)
    needs: [check-skip, validate-runtime-config]
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@codex/reusable-build-deploy-split
    with:
      vps_user: ${{ vars.VPS_USER }}
      vps_host: ${{ vars.VPS_HOST }}
      deploy_dir: ${{ vars.VPS_APP_DIR }}
      compose_file: deploy/compose.vps.yml
      services: api web
      bootstrap_databases: ${{ vars.DB_NAME }}
      health_retries: 20
      health_interval: 5
      log_tail: 100
    secrets:
      runtime_env: |
        API_IMAGE=ghcr.io/${{ github.repository_owner }}/hoop-api:${{ inputs.image_tag }}
        WEB_IMAGE=ghcr.io/${{ github.repository_owner }}/hoop-web:${{ inputs.image_tag }}
        DB_HOST=${{ vars.DB_HOST || 'postgres' }}
        DB_PORT=${{ vars.DB_PORT || '5432' }}
        DB_NAME=${{ vars.DB_NAME }}
        DB_USER=${{ vars.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST || 'postgres' }}:${{ vars.DB_PORT || '5432' }}/${{ vars.DB_NAME }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
        OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
        OLLAMA_MODEL=${{ vars.OLLAMA_MODEL }}
        API_URL=${{ vars.API_URL }}
        NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
        NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}
