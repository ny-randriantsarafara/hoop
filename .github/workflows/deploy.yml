name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (example: main, sha-abcdef123456)'
        required: false
        default: main

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hoop-api
  WEB_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hoop-web

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Check for skip conditions
        id: skip_check
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" =~ \[skip\ deploy\] ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: found [skip deploy]"
            exit 0
          fi

          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: check-skip
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.API_IMAGE_NAME }}:main

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.WEB_IMAGE_NAME }}:main

  deploy-auto:
    name: Deploy to VPS (auto)
    runs-on: ubuntu-latest
    needs: [check-skip, build-images]
    if: github.event_name == 'push' && needs.check-skip.outputs.should_skip != 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Deploy selected images
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          API_IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
        run: |
          API_IMAGE="${API_IMAGE_NAME}:${IMAGE_TAG}"
          WEB_IMAGE="${WEB_IMAGE_NAME}:${IMAGE_TAG}"

          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' GHCR_USER='$GHCR_USER' GHCR_READ_TOKEN='$GHCR_READ_TOKEN' API_IMAGE='$API_IMAGE' WEB_IMAGE='$WEB_IMAGE' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" docker compose pull api web
          API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" docker compose up -d api web

          for i in $(seq 1 20); do
            api_cid=$(docker compose ps -q api)
            web_cid=$(docker compose ps -q web)

            api_state=$(docker inspect --format '{{.State.Status}}' "$api_cid")
            web_state=$(docker inspect --format '{{.State.Status}}' "$web_cid")
            api_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$api_cid")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$web_cid")

            if [[ "$api_state" == "running" && "$web_state" == "running" ]] &&
               [[ ("$api_health" == "healthy" || "$api_health" == "none") && ("$web_health" == "healthy" || "$web_health" == "none") ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Services failed health check"
          exit 1
          EOF_REMOTE

  deploy-manual:
    name: Deploy to VPS (manual)
    runs-on: ubuntu-latest
    needs: check-skip
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Validate manual image tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -z "$IMAGE_TAG" ]]; then
            echo "IMAGE_TAG is required"
            exit 1
          fi

          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid image tag: $IMAGE_TAG"
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

      - name: Deploy selected images
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          API_IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
        run: |
          API_IMAGE="${API_IMAGE_NAME}:${IMAGE_TAG}"
          WEB_IMAGE="${WEB_IMAGE_NAME}:${IMAGE_TAG}"

          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' GHCR_USER='$GHCR_USER' GHCR_READ_TOKEN='$GHCR_READ_TOKEN' API_IMAGE='$API_IMAGE' WEB_IMAGE='$WEB_IMAGE' bash -s" <<'EOF_REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" docker compose pull api web
          API_IMAGE="$API_IMAGE" WEB_IMAGE="$WEB_IMAGE" docker compose up -d api web

          for i in $(seq 1 20); do
            api_cid=$(docker compose ps -q api)
            web_cid=$(docker compose ps -q web)

            api_state=$(docker inspect --format '{{.State.Status}}' "$api_cid")
            web_state=$(docker inspect --format '{{.State.Status}}' "$web_cid")
            api_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$api_cid")
            web_health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$web_cid")

            if [[ "$api_state" == "running" && "$web_state" == "running" ]] &&
               [[ ("$api_health" == "healthy" || "$api_health" == "none") && ("$web_health" == "healthy" || "$web_health" == "none") ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Services failed health check"
          exit 1
          EOF_REMOTE
